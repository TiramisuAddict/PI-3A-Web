# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    huggingface.api_key: '%env(string:HUGGINGFACE_API_KEY)%'
    huggingface.model: '%env(string:HUGGINGFACE_MODEL)%'
    huggingface.timeout_seconds: 20
    ml.python_executable_default: 'python'
    ml.python_executable: '%env(default:ml.python_executable_default:ML_PYTHON_EXECUTABLE)%'
    ml.demande_ai_script: '%kernel.project_dir%/ml/demande/demande_ai_model.py'
    ml.demande_decision_script: '%kernel.project_dir%/ml/demande/demande_decision_model.py'
    news_api_key_default: ''

    google_maps_api_key: '%env(GOOGLE_MAPS_API_KEY)%'
    uploads_dir: '%kernel.project_dir%/public/uploads'
services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\DemandeAiAssistant:
        arguments:
            $apiKey: '%huggingface.api_key%'
            $model: '%huggingface.model%'
            $timeoutSeconds: '%huggingface.timeout_seconds%'
            $pythonExecutable: '%ml.python_executable%'
            $pythonScriptPath: '%ml.demande_ai_script%'

    App\Service\DemandeDecisionAssistant:
        arguments:
            $apiKey: '%huggingface.api_key%'
            $model: '%huggingface.model%'
            $timeoutSeconds: '%huggingface.timeout_seconds%'
            $pythonExecutable: '%ml.python_executable%'
            $pythonScriptPath: '%ml.demande_decision_script%'

    App\Service\MailerService:
        bind:
            $mailerFromAddress: '%env(string:MAILER_FROM)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\TaskDescriptionService:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'
            $apiUrl: '%env(GROQ_API_URL)%'
            $model: '%env(GROQ_MODEL)%'

    App\Service\ProjectRiskReportService:
        arguments:
            $apiKey: '%env(GROQ_API_KEY)%'
            $apiUrl: '%env(GROQ_API_URL)%'
            $model: '%env(GROQ_MODEL)%'
    App\Service\NewsService:
        arguments:
            $newsApiKey: '%env(default:news_api_key_default:NEWS_API_KEY)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
